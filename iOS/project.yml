name: Roomrate
options:
  bundleIdPrefix: com.shimondeitel.roomrate
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Roomrate:
    type: application
    platform: iOS
    sources:
      - path: Roomrate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roomrate
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Roomrate/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RoomrateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RoomrateTests
      - path: Roomrate.storekit
    dependencies:
      - target: Roomrate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roomrate.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RoomrateUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RoomrateUITests
    dependencies:
      - target: Roomrate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roomrate.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Roomrate:
    build:
      targets:
        Roomrate: all
        RoomrateTests: [test]
        RoomrateUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Roomrate.storekit
    test:
      config: Debug
      storeKitConfiguration: Roomrate.storekit
      targets:
        - RoomrateTests
        - RoomrateUITests
    archive:
      config: Release
